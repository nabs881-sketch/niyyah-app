<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <mask id="hole">
      <rect width="500" height="500" fill="white"/>
      <circle cx="250" cy="250" r="175" fill="black"/>
    </mask>
  </defs>
  <g opacity="0.22" mask="url(#hole)">
    <!-- 3 cercles concentriques -->
    <circle cx="250" cy="250" r="210" fill="none" stroke="rgba(200,149,106,0.9)" stroke-width="1.2"/>
    <circle cx="250" cy="250" r="230" fill="none" stroke="rgba(200,149,106,0.9)" stroke-width="1.2"/>
    <circle cx="250" cy="250" r="245" fill="none" stroke="rgba(200,149,106,0.9)" stroke-width="1.2"/>
    <!-- 8 pétales goutte pointant vers l'extérieur -->
    <g fill="rgba(200,149,106,0.3)" stroke="rgba(200,149,106,0.9)" stroke-width="1.2">
      <path d="M250,180 Q268,210 250,245 Q232,210 250,180Z" transform="rotate(0 250 250)"/>
      <path d="M250,180 Q268,210 250,245 Q232,210 250,180Z" transform="rotate(45 250 250)"/>
      <path d="M250,180 Q268,210 250,245 Q232,210 250,180Z" transform="rotate(90 250 250)"/>
      <path d="M250,180 Q268,210 250,245 Q232,210 250,180Z" transform="rotate(135 250 250)"/>
      <path d="M250,180 Q268,210 250,245 Q232,210 250,180Z" transform="rotate(180 250 250)"/>
      <path d="M250,180 Q268,210 250,245 Q232,210 250,180Z" transform="rotate(225 250 250)"/>
      <path d="M250,180 Q268,210 250,245 Q232,210 250,180Z" transform="rotate(270 250 250)"/>
      <path d="M250,180 Q268,210 250,245 Q232,210 250,180Z" transform="rotate(315 250 250)"/>
    </g>
    <!-- 8 petits diamants entre les pétales -->
    <g fill="rgba(200,149,106,0.3)" stroke="rgba(200,149,106,0.9)" stroke-width="1.2">
      <path d="M250,195 L258,215 250,235 242,215Z" transform="rotate(22.5 250 250)"/>
      <path d="M250,195 L258,215 250,235 242,215Z" transform="rotate(67.5 250 250)"/>
      <path d="M250,195 L258,215 250,235 242,215Z" transform="rotate(112.5 250 250)"/>
      <path d="M250,195 L258,215 250,235 242,215Z" transform="rotate(157.5 250 250)"/>
      <path d="M250,195 L258,215 250,235 242,215Z" transform="rotate(202.5 250 250)"/>
      <path d="M250,195 L258,215 250,235 242,215Z" transform="rotate(247.5 250 250)"/>
      <path d="M250,195 L258,215 250,235 242,215Z" transform="rotate(292.5 250 250)"/>
      <path d="M250,195 L258,215 250,235 242,215Z" transform="rotate(337.5 250 250)"/>
    </g>
  </g>
</svg>
