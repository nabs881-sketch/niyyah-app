<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <g opacity="0.18" fill="none" stroke="rgba(200,149,106,0.8)" stroke-width="1">
    <!-- 4 cercles concentriques -->
    <circle cx="250" cy="250" r="240"/>
    <circle cx="250" cy="250" r="200"/>
    <circle cx="250" cy="250" r="160"/>
    <circle cx="250" cy="250" r="120"/>
    <!-- Étoile 8 branches -->
    <polygon points="250,30 280,200 470,170 300,250 470,330 280,300 250,470 220,300 30,330 200,250 30,170 220,200"/>
    <!-- Étoile 8 branches décalée 22.5° -->
    <g transform="rotate(22.5 250 250)">
      <polygon points="250,30 280,200 470,170 300,250 470,330 280,300 250,470 220,300 30,330 200,250 30,170 220,200"/>
    </g>
    <!-- 8 ellipses rayonnantes (pétales) -->
    <g transform="translate(250,250)">
      <ellipse rx="25" ry="80" transform="rotate(0)"/>
      <ellipse rx="25" ry="80" transform="rotate(45)"/>
      <ellipse rx="25" ry="80" transform="rotate(90)"/>
      <ellipse rx="25" ry="80" transform="rotate(135)"/>
      <ellipse rx="25" ry="80" transform="rotate(180)"/>
      <ellipse rx="25" ry="80" transform="rotate(225)"/>
      <ellipse rx="25" ry="80" transform="rotate(270)"/>
      <ellipse rx="25" ry="80" transform="rotate(315)"/>
    </g>
    <!-- Point central -->
    <circle cx="250" cy="250" r="4" fill="rgba(200,149,106,0.8)"/>
  </g>
</svg>
